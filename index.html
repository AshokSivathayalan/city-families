<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twin Cities of the World</title>
  <script src="https://unpkg.com/deck.gl@latest/dist.min.js"></script>
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a1a; color: #e0e0e0; overflow: hidden; }
    #map { width: 100vw; height: 100vh; }

    /* Panel */
    #panel {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(10, 10, 26, 0.92);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 20px;
      max-width: 340px;
      width: 340px;
      z-index: 10;
    }
    #panel h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; color: #fff; }
    #panel .subtitle { font-size: 13px; color: #888; margin-bottom: 12px; }

    /* Stats */
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
    .stat { background: rgba(255,255,255,0.04); border-radius: 8px; padding: 10px; }
    .stat .value { font-size: 22px; font-weight: 700; color: #6ee7b7; }
    .stat .label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Tabs */
    .tab-bar {
      display: flex;
      gap: 2px;
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 3px;
      margin-bottom: 14px;
    }
    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      color: #888;
      font-size: 12px;
      font-weight: 500;
      padding: 7px 0;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab-btn:hover { color: #ccc; }
    .tab-btn.active { background: rgba(255,255,255,0.1); color: #fff; }

    .tool-panel { display: none; }
    .tool-panel.active { display: block; }

    /* Shared form styles */
    .tool-panel label { font-size: 12px; color: #aaa; display: block; margin-bottom: 4px; }
    .tool-panel select, .tool-panel input[type=range] { width: 100%; }
    .tool-panel .field { margin-bottom: 10px; }
    select {
      background: rgba(255,255,255,0.06);
      color: #e0e0e0;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 13px;
      width: 100%;
    }

    /* Autocomplete */
    .autocomplete-wrap { position: relative; }
    .autocomplete-wrap input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      color: #e0e0e0;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
    }
    .autocomplete-wrap input:focus { border-color: rgba(110, 231, 183, 0.4); }
    .autocomplete-list {
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      background: rgba(15, 15, 30, 0.98);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      margin-top: 2px;
      max-height: 180px;
      overflow-y: auto;
      z-index: 30;
      display: none;
    }
    .autocomplete-list.open { display: block; }
    .autocomplete-item {
      padding: 7px 10px;
      font-size: 13px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .autocomplete-item:hover, .autocomplete-item.selected { background: rgba(110, 231, 183, 0.12); color: #fff; }
    .autocomplete-item:last-child { border-bottom: none; }

    /* Buttons */
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary { background: #6ee7b7; color: #0a0a1a; }
    .btn-primary:hover { background: #5dd9a8; }
    .btn-primary:disabled { opacity: 0.4; cursor: default; }
    .btn-ghost { background: rgba(255,255,255,0.06); color: #aaa; }
    .btn-ghost:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .btn-row { display: flex; gap: 6px; margin-top: 4px; }

    /* Path results */
    #path-result { margin-top: 12px; display: none; }
    #path-result.visible { display: block; }
    .path-summary { font-size: 13px; color: #6ee7b7; margin-bottom: 8px; font-weight: 500; }
    .path-list { list-style: none; padding: 0; }
    .path-list li {
      font-size: 12px;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .path-list li:last-child { border-bottom: none; }
    .hop-num {
      background: rgba(110, 231, 183, 0.15);
      color: #6ee7b7;
      border-radius: 50%;
      width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 600;
      flex-shrink: 0;
    }
    .path-error { font-size: 13px; color: #f87171; margin-top: 8px; }

    /* Explorer results */
    #ego-result { margin-top: 12px; display: none; }
    #ego-result.visible { display: block; }
    .ego-summary { font-size: 13px; color: #6ee7b7; margin-bottom: 10px; font-weight: 500; }
    .degree-group { margin-bottom: 10px; }
    .degree-header {
      font-size: 12px;
      font-weight: 600;
      padding: 5px 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      user-select: none;
    }
    .degree-header .arrow { font-size: 10px; transition: transform 0.15s; }
    .degree-header.collapsed .arrow { transform: rotate(-90deg); }
    .degree-header .ring-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .degree-cities {
      max-height: 120px;
      overflow-y: auto;
      padding-left: 22px;
    }
    .degree-cities.collapsed { display: none; }
    .degree-cities .city-item {
      font-size: 12px;
      color: #aaa;
      padding: 2px 0;
    }

    /* Tooltip */
    #tooltip {
      position: absolute;
      pointer-events: none;
      background: rgba(10, 10, 26, 0.95);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      z-index: 20;
      display: none;
      max-width: 280px;
    }
    #tooltip .tt-title { font-weight: 600; color: #fff; margin-bottom: 2px; }
    #tooltip .tt-detail { color: #aaa; font-size: 12px; }

    /* Loading */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a1a;
      z-index: 100;
      flex-direction: column;
      gap: 12px;
    }
    #loading .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #6ee7b7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div>Loading twin city data...</div>
  </div>

  <div id="panel">
    <h1>Twin Cities of the World</h1>
    <p class="subtitle">A network of sister city relationships</p>
    <div class="stats">
      <div class="stat">
        <div class="value" id="stat-cities">-</div>
        <div class="label">Cities</div>
      </div>
      <div class="stat">
        <div class="value" id="stat-connections">-</div>
        <div class="label">Connections</div>
      </div>
      <div class="stat">
        <div class="value" id="stat-families">-</div>
        <div class="label">Families</div>
      </div>
      <div class="stat">
        <div class="value" id="stat-countries">-</div>
        <div class="label">Continents</div>
      </div>
    </div>

    <!-- Tab bar -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="map">Map</button>
      <button class="tab-btn" data-tab="pathfinder">Pathfinder</button>
      <button class="tab-btn" data-tab="explorer">Explorer</button>
    </div>

    <!-- Map controls tab -->
    <div class="tool-panel active" id="tab-map">
      <div class="field" style="display:flex; align-items:center; gap:8px;">
        <input type="checkbox" id="show-arcs" style="accent-color:#6ee7b7;" />
        <label for="show-arcs" style="margin:0; cursor:pointer;">Show arcs</label>
      </div>
      <div id="arc-controls" style="display:none;">
        <div class="field">
          <label>Color arcs by</label>
          <select id="color-mode">
            <option value="community">Community</option>
            <option value="continent">Source continent</option>
            <option value="distance">Distance</option>
          </select>
        </div>
        <div class="field">
          <label>Arc opacity</label>
          <input type="range" id="opacity" min="5" max="100" value="35" />
        </div>
        <div class="field">
          <label>Arc width</label>
          <input type="range" id="width" min="1" max="8" value="2" />
        </div>
        <div class="field">
          <label>Min twins: <span id="min-degree-val">1</span></label>
          <input type="range" id="min-degree" min="1" max="30" value="1" />
        </div>
      </div>
    </div>

    <!-- Pathfinder tab -->
    <div class="tool-panel" id="tab-pathfinder">
      <div class="field">
        <label>From city</label>
        <div class="autocomplete-wrap" id="ac-from">
          <input type="text" id="city-from" placeholder="Start typing a city name..." autocomplete="off" />
          <div class="autocomplete-list" id="ac-from-list"></div>
        </div>
      </div>
      <div class="field">
        <label>To city</label>
        <div class="autocomplete-wrap" id="ac-to">
          <input type="text" id="city-to" placeholder="Start typing a city name..." autocomplete="off" />
          <div class="autocomplete-list" id="ac-to-list"></div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-find-path">Find Path</button>
        <button class="btn btn-ghost" id="btn-clear-path">Clear</button>
      </div>
      <div id="path-result">
        <div class="path-summary" id="path-summary"></div>
        <ul class="path-list" id="path-list"></ul>
      </div>
      <div class="path-error" id="path-error" style="display:none;"></div>
    </div>

    <!-- Explorer tab -->
    <div class="tool-panel" id="tab-explorer">
      <div class="field">
        <label>City</label>
        <div class="autocomplete-wrap" id="ac-ego">
          <input type="text" id="city-ego" placeholder="Start typing a city name..." autocomplete="off" />
          <div class="autocomplete-list" id="ac-ego-list"></div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-explore">Explore</button>
        <button class="btn btn-ghost" id="btn-clear-ego">Clear</button>
      </div>
      <div id="ego-result">
        <div class="ego-summary" id="ego-summary"></div>
        <div id="ego-groups"></div>
      </div>
      <div class="path-error" id="ego-error" style="display:none;"></div>
    </div>
  </div>

  <div id="tooltip">
    <div class="tt-title" id="tt-title"></div>
    <div class="tt-detail" id="tt-detail"></div>
  </div>

  <div id="map"></div>

  <script>
    // ── Color palettes ──
    const COMMUNITY_COLORS = [
      [110, 231, 183], [251, 146, 60], [147, 130, 255], [251, 207, 74],
      [236, 72, 153], [56, 189, 248], [248, 113, 113], [163, 230, 53],
      [232, 121, 249], [45, 212, 191], [251, 191, 36], [129, 140, 248],
      [74, 222, 128], [244, 114, 182], [34, 211, 238], [253, 186, 116],
      [192, 132, 252], [134, 239, 172], [252, 165, 165], [125, 211, 252],
    ];
    const CONTINENT_COLORS = {
      'Europe': [110, 231, 183], 'Asia': [251, 146, 60],
      'North America': [147, 130, 255], 'South America': [251, 207, 74],
      'Africa': [236, 72, 153], 'Oceania': [56, 189, 248], 'Other': [180, 180, 180],
    };
    const PATH_COLOR = [255, 220, 80];
    const EGO_COLORS = [
      [255, 220, 80],   // center (gold)
      [110, 231, 183],  // 1st degree (emerald)
      [56, 189, 248],   // 2nd degree (sky)
    ];
    const EGO_OPACITIES = [1.0, 0.9, 0.45];
    const EGO_WIDTHS = [0, 4, 2]; // index 0 unused (center has no arcs to itself)

    // ── State ──
    let allData = null;
    let deckInstance = null;
    let adjacency = null;     // Map<name, Set<name>>
    let cityByName = null;    // Map<name, nodeObj>
    let cityNames = [];       // sorted list for autocomplete
    let currentPath = null;   // array of city names, or null
    let currentEgo = null;    // { center: string, depths: Map<name, depth> } or null
    let showArcs = false;     // arcs hidden by default

    // ── Tabs ──
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tool-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });

    // ── Arc color helper ──
    function getArcColor(d, mode) {
      if (mode === 'community') {
        return COMMUNITY_COLORS[d.sourceCommunity % COMMUNITY_COLORS.length];
      } else if (mode === 'continent') {
        return CONTINENT_COLORS[d.sourceContinent] || CONTINENT_COLORS['Other'];
      } else {
        const [x1, y1] = d.sourcePosition;
        const [x2, y2] = d.targetPosition;
        const dist = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
        const t = Math.min(dist / 180, 1);
        return [Math.round(110 + t * 141), Math.round(231 - t * 159), Math.round(183 - t * 30)];
      }
    }

    // ── Great-circle interpolation ──
    // Returns an array of [lon, lat] points along the great circle between two points.
    // Handles antimeridian crossing by keeping longitude continuous (unwrapped).
    function greatCirclePoints(lon1, lat1, lon2, lat2, numPoints = 30) {
      const toRad = Math.PI / 180;
      const toDeg = 180 / Math.PI;
      const phi1 = lat1 * toRad, lam1 = lon1 * toRad;
      const phi2 = lat2 * toRad, lam2 = lon2 * toRad;

      const dLam = lam2 - lam1;
      const d = Math.acos(
        Math.sin(phi1) * Math.sin(phi2) +
        Math.cos(phi1) * Math.cos(phi2) * Math.cos(dLam)
      );

      // If points are very close, just return a straight line
      if (d < 1e-6) return [[lon1, lat1], [lon2, lat2]];

      const points = [];
      for (let i = 0; i <= numPoints; i++) {
        const f = i / numPoints;
        const A = Math.sin((1 - f) * d) / Math.sin(d);
        const B = Math.sin(f * d) / Math.sin(d);
        const x = A * Math.cos(phi1) * Math.cos(lam1) + B * Math.cos(phi2) * Math.cos(lam2);
        const y = A * Math.cos(phi1) * Math.sin(lam1) + B * Math.cos(phi2) * Math.sin(lam2);
        const z = A * Math.sin(phi1) + B * Math.sin(phi2);
        const lat = Math.atan2(z, Math.sqrt(x * x + y * y)) * toDeg;
        let lon = Math.atan2(y, x) * toDeg;
        points.push([lon, lat]);
      }

      // Unwrap longitude so the path doesn't jump across the map
      for (let i = 1; i < points.length; i++) {
        while (points[i][0] - points[i - 1][0] > 180) points[i][0] -= 360;
        while (points[i][0] - points[i - 1][0] < -180) points[i][0] += 360;
      }

      return points;
    }

    // Precompute path(s) for an arc object (cached on first access).
    // Returns an array of path arrays. Cross-antimeridian arcs get a duplicate
    // shifted by ±360° so they're visible on both sides of the map.
    function getArcPaths(arc) {
      if (!arc._paths) {
        const [lon1, lat1] = arc.sourcePosition;
        const [lon2, lat2] = arc.targetPosition;
        const path = greatCirclePoints(lon1, lat1, lon2, lat2);
        const minLon = Math.min(...path.map(p => p[0]));
        const maxLon = Math.max(...path.map(p => p[0]));

        arc._paths = [path];
        // If the path extends outside [-180, 180], add a wrapped copy
        if (maxLon > 180) {
          arc._paths.push(path.map(([lon, lat]) => [lon - 360, lat]));
        } else if (minLon < -180) {
          arc._paths.push(path.map(([lon, lat]) => [lon + 360, lat]));
        }
      }
      return arc._paths;
    }

    // Expand a list of arc objects into path-layer-ready items,
    // duplicating cross-antimeridian arcs. Preserves source arc reference for color/hover.
    function expandArcsToPathData(arcs) {
      const items = [];
      for (const arc of arcs) {
        for (const path of getArcPaths(arc)) {
          items.push({ ...arc, _flatPath: path });
        }
      }
      return items;
    }

    // ── Layer rendering ──
    function updateLayers() {
      if (!allData || !deckInstance) return;

      const mode = document.getElementById('color-mode').value;
      const baseOpacity = parseInt(document.getElementById('opacity').value) / 100;
      const width = parseInt(document.getElementById('width').value);
      const minDegree = parseInt(document.getElementById('min-degree').value);

      // If a path or ego view is active, dim everything else
      const dimmed = currentPath !== null || currentEgo !== null;
      const arcOpacity = dimmed ? 0.08 : baseOpacity;

      // Filter arcs and nodes by min-degree when arcs are shown
      const arcsVisible = showArcs && !dimmed;
      const filteredArcs = arcsVisible
        ? allData.arcs.filter(d => {
            const src = cityByName.get(d.sourceName);
            const tgt = cityByName.get(d.targetName);
            return (src && (src.degree || 0) >= minDegree) && (tgt && (tgt.degree || 0) >= minDegree);
          })
        : [];

      const layers = [];

      // Base arc layer (only when arcs toggled on and no tool is active)
      if (arcsVisible) {
        layers.push(new deck.PathLayer({
          id: 'arcs',
          data: expandArcsToPathData(filteredArcs),
          getPath: d => d._flatPath,
          getColor: d => [...getArcColor(d, mode), Math.round(baseOpacity * 255)],
          getWidth: width,
          widthUnits: 'pixels',
          pickable: true,
          autoHighlight: true,
          highlightColor: [255, 255, 255, 200],
          onHover: onArcHover,
          updateTriggers: {
            getColor: [mode, baseOpacity],
          },
        }));
      }

      // Base scatter layer
      layers.push(new deck.ScatterplotLayer({
        id: 'cities',
        data: allData.nodes,
        getPosition: d => [d.lon, d.lat],
        getFillColor: d => {
          if (dimmed) return [100, 100, 120, 25];
          if (mode === 'community') return [...COMMUNITY_COLORS[d.community % COMMUNITY_COLORS.length], 200];
          if (mode === 'continent') return [...(CONTINENT_COLORS[d.continent] || CONTINENT_COLORS['Other']), 200];
          return [110, 231, 183, 200];
        },
        getRadius: d => Math.max(2, Math.sqrt(d.degree || 1)) * 8000,
        radiusMinPixels: 1.5,
        radiusMaxPixels: 12,
        pickable: !dimmed,
        onHover: onCityHover,
        updateTriggers: { getFillColor: [mode, dimmed] },
      }));

      // Path highlight layers
      if (currentPath && currentPath.length >= 2) {
        // Build path arcs
        const pathArcs = [];
        for (let i = 0; i < currentPath.length - 1; i++) {
          const src = cityByName.get(currentPath[i]);
          const tgt = cityByName.get(currentPath[i + 1]);
          if (src && tgt) {
            pathArcs.push({
              sourcePosition: [src.lon, src.lat],
              targetPosition: [tgt.lon, tgt.lat],
              sourceName: src.name,
              targetName: tgt.name,
            });
          }
        }

        layers.push(new deck.PathLayer({
          id: 'path-arcs',
          data: expandArcsToPathData(pathArcs),
          getPath: d => d._flatPath,
          getColor: [...PATH_COLOR, 255],
          getWidth: Math.max(width * 2, 4),
          widthUnits: 'pixels',
          pickable: true,
          onHover: onArcHover,
        }));

        // Path city dots
        const pathNodes = currentPath.map(name => cityByName.get(name)).filter(Boolean);
        layers.push(new deck.ScatterplotLayer({
          id: 'path-cities',
          data: pathNodes,
          getPosition: d => [d.lon, d.lat],
          getFillColor: [...PATH_COLOR, 230],
          getRadius: 40000,
          radiusMinPixels: 5,
          radiusMaxPixels: 16,
          pickable: true,
          onHover: onCityHover,
        }));
      }

      // Ego-network layers (3 degree rings)
      if (currentEgo) {
        const { center, depths } = currentEgo;

        // Group edges by degree ring: ring N = edges connecting a depth N-1 node to a depth N node
        for (let deg = 1; deg <= 2; deg++) {
          const ringArcs = [];
          const ringNodes = [];
          const color = EGO_COLORS[deg];
          const alpha = EGO_OPACITIES[deg];
          const w = EGO_WIDTHS[deg];

          // Collect nodes at this depth
          for (const [name, d] of depths) {
            if (d === deg) {
              const node = cityByName.get(name);
              if (node) ringNodes.push(node);
            }
          }

          // Collect edges: source at depth deg-1, target at depth deg (or vice versa)
          for (const edge of (allData.edges || [])) {
            const sd = depths.get(edge.source);
            const td = depths.get(edge.target);
            if (sd === undefined || td === undefined) continue;
            if ((sd === deg - 1 && td === deg) || (sd === deg && td === deg - 1)) {
              const src = cityByName.get(edge.source);
              const tgt = cityByName.get(edge.target);
              if (src && tgt) {
                ringArcs.push({
                  sourcePosition: [src.lon, src.lat],
                  targetPosition: [tgt.lon, tgt.lat],
                  sourceName: src.name,
                  targetName: tgt.name,
                });
              }
            }
          }

          if (ringArcs.length) {
            layers.push(new deck.PathLayer({
              id: `ego-arcs-${deg}`,
              data: expandArcsToPathData(ringArcs),
              getPath: d => d._flatPath,
              getColor: [...color, Math.round(alpha * 255)],
              getWidth: w,
              widthUnits: 'pixels',
              pickable: true,
              onHover: onArcHover,
            }));
          }

          if (ringNodes.length) {
            layers.push(new deck.ScatterplotLayer({
              id: `ego-dots-${deg}`,
              data: ringNodes,
              getPosition: d => [d.lon, d.lat],
              getFillColor: [...color, Math.round(alpha * 230)],
              getRadius: Math.max(20000, 50000 - deg * 12000),
              radiusMinPixels: Math.max(2, 6 - deg),
              radiusMaxPixels: Math.max(6, 14 - deg * 3),
              pickable: true,
              onHover: onCityHover,
            }));
          }
        }

        // Center city dot (on top)
        const centerNode = cityByName.get(center);
        if (centerNode) {
          layers.push(new deck.ScatterplotLayer({
            id: 'ego-center',
            data: [centerNode],
            getPosition: d => [d.lon, d.lat],
            getFillColor: [...EGO_COLORS[0], 255],
            getRadius: 60000,
            radiusMinPixels: 7,
            radiusMaxPixels: 18,
            pickable: true,
            onHover: onCityHover,
          }));
        }
      }

      deckInstance.setProps({ layers });
    }

    // ── Tooltips ──
    function onArcHover(info) {
      const tooltip = document.getElementById('tooltip');
      if (info.object) {
        tooltip.style.display = 'block';
        tooltip.style.left = info.x + 12 + 'px';
        tooltip.style.top = info.y + 12 + 'px';
        document.getElementById('tt-title').textContent =
          `${info.object.sourceName} \u2194 ${info.object.targetName}`;
        const detail = info.object.sourceContinent && info.object.targetContinent
          ? `${info.object.sourceContinent} \u2194 ${info.object.targetContinent}` : '';
        document.getElementById('tt-detail').textContent = detail;
      } else {
        tooltip.style.display = 'none';
      }
    }

    function onCityHover(info) {
      const tooltip = document.getElementById('tooltip');
      if (info.object) {
        tooltip.style.display = 'block';
        tooltip.style.left = info.x + 12 + 'px';
        tooltip.style.top = info.y + 12 + 'px';
        document.getElementById('tt-title').textContent = info.object.name;
        const deg = info.object.degree || '?';
        document.getElementById('tt-detail').textContent =
          `${deg} twin${deg !== 1 ? 's' : ''} \u00b7 ${info.object.continent || ''}`;
      } else {
        tooltip.style.display = 'none';
      }
    }

    // ── Autocomplete ──
    function setupAutocomplete(inputId, listId) {
      const input = document.getElementById(inputId);
      const list = document.getElementById(listId);
      let selectedIdx = -1;

      function render(matches) {
        list.innerHTML = '';
        selectedIdx = -1;
        if (matches.length === 0) { list.classList.remove('open'); return; }
        list.classList.add('open');
        matches.slice(0, 50).forEach((name, i) => {
          const div = document.createElement('div');
          div.className = 'autocomplete-item';
          div.textContent = name;
          div.addEventListener('mousedown', e => {
            e.preventDefault();
            input.value = name;
            list.classList.remove('open');
          });
          list.appendChild(div);
        });
      }

      input.addEventListener('input', () => {
        const q = input.value.toLowerCase().trim();
        if (q.length < 1) { list.classList.remove('open'); return; }
        // Prioritize starts-with matches, then includes
        const starts = [];
        const includes = [];
        for (const name of cityNames) {
          const lower = name.toLowerCase();
          if (lower.startsWith(q)) starts.push(name);
          else if (lower.includes(q)) includes.push(name);
        }
        render([...starts, ...includes]);
      });

      input.addEventListener('keydown', e => {
        const items = list.querySelectorAll('.autocomplete-item');
        if (!items.length) return;
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          selectedIdx = Math.min(selectedIdx + 1, items.length - 1);
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          selectedIdx = Math.max(selectedIdx - 1, 0);
        } else if (e.key === 'Enter' && selectedIdx >= 0) {
          e.preventDefault();
          input.value = items[selectedIdx].textContent;
          list.classList.remove('open');
          return;
        } else { return; }
        items.forEach((el, i) => el.classList.toggle('selected', i === selectedIdx));
        items[selectedIdx].scrollIntoView({ block: 'nearest' });
      });

      input.addEventListener('blur', () => {
        setTimeout(() => list.classList.remove('open'), 150);
      });
      input.addEventListener('focus', () => {
        if (input.value.trim().length >= 1) input.dispatchEvent(new Event('input'));
      });
    }

    // ── BFS pathfinding ──
    function bfs(source, target) {
      if (source === target) return [source];
      if (!adjacency.has(source) || !adjacency.has(target)) return null;

      const visited = new Set([source]);
      const queue = [[source]];

      while (queue.length > 0) {
        const path = queue.shift();
        const current = path[path.length - 1];
        const neighbors = adjacency.get(current);
        if (!neighbors) continue;

        for (const neighbor of neighbors) {
          if (visited.has(neighbor)) continue;
          const newPath = [...path, neighbor];
          if (neighbor === target) return newPath;
          visited.add(neighbor);
          queue.push(newPath);
        }
      }

      return null; // no path
    }

    function showPath(path) {
      // Clear ego state if active
      currentEgo = null;
      document.getElementById('ego-result').classList.remove('visible');

      currentPath = path;
      const resultEl = document.getElementById('path-result');
      const summaryEl = document.getElementById('path-summary');
      const listEl = document.getElementById('path-list');
      const errorEl = document.getElementById('path-error');

      errorEl.style.display = 'none';
      resultEl.classList.add('visible');
      summaryEl.textContent = `${path.length} cities, ${path.length - 1} hop${path.length - 1 !== 1 ? 's' : ''}`;

      listEl.innerHTML = '';
      path.forEach((name, i) => {
        const li = document.createElement('li');
        const num = document.createElement('span');
        num.className = 'hop-num';
        num.textContent = i + 1;
        const label = document.createElement('span');
        const city = cityByName.get(name);
        label.textContent = city ? `${name} (${city.continent || ''})` : name;
        li.appendChild(num);
        li.appendChild(label);
        listEl.appendChild(li);
      });

      updateLayers();
    }

    function showError(msg) {
      document.getElementById('path-result').classList.remove('visible');
      const errorEl = document.getElementById('path-error');
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
    }

    function clearPath() {
      currentPath = null;
      document.getElementById('path-result').classList.remove('visible');
      document.getElementById('path-error').style.display = 'none';
      document.getElementById('city-from').value = '';
      document.getElementById('city-to').value = '';
      updateLayers();
    }

    // ── Ego-network (Explorer) ──
    function getEgoNetwork(centerName, maxDepth = 2) {
      const depths = new Map();
      depths.set(centerName, 0);
      const queue = [centerName];

      while (queue.length > 0) {
        const current = queue.shift();
        const currentDepth = depths.get(current);
        if (currentDepth >= maxDepth) continue;

        const neighbors = adjacency.get(current);
        if (!neighbors) continue;
        for (const neighbor of neighbors) {
          if (!depths.has(neighbor)) {
            depths.set(neighbor, currentDepth + 1);
            queue.push(neighbor);
          }
        }
      }

      return depths;
    }

    function showEgo(centerName) {
      // Clear pathfinder state if active
      currentPath = null;
      document.getElementById('path-result').classList.remove('visible');

      const depths = getEgoNetwork(centerName);
      currentEgo = { center: centerName, depths };

      // Count per degree
      const counts = [0, 0, 0]; // index 0 = center
      for (const d of depths.values()) counts[d]++;

      const resultEl = document.getElementById('ego-result');
      const summaryEl = document.getElementById('ego-summary');
      const groupsEl = document.getElementById('ego-groups');
      const errorEl = document.getElementById('ego-error');

      errorEl.style.display = 'none';
      resultEl.classList.add('visible');

      const parts = [];
      if (counts[1]) parts.push(`${counts[1]} twin${counts[1] !== 1 ? 's' : ''}`);
      if (counts[2]) parts.push(`${counts[2]} 2nd-degree`);
      summaryEl.textContent = parts.join(', ') || 'No connections found.';

      // Build collapsible groups per degree
      groupsEl.innerHTML = '';
      const labels = ['', '1st degree (twins)', '2nd degree'];
      for (let deg = 1; deg <= 2; deg++) {
        const cities = [];
        for (const [name, d] of depths) {
          if (d === deg) cities.push(name);
        }
        if (cities.length === 0) continue;
        cities.sort();

        const group = document.createElement('div');
        group.className = 'degree-group';

        const header = document.createElement('div');
        header.className = 'degree-header';
        const dotColor = EGO_COLORS[deg];
        header.innerHTML = `<span class="arrow">\u25BC</span><span class="ring-dot" style="background:rgb(${dotColor.join(',')})"></span>${labels[deg]} (${cities.length})`;

        const list = document.createElement('div');
        list.className = 'degree-cities';
        for (const name of cities) {
          const item = document.createElement('div');
          item.className = 'city-item';
          item.textContent = name;
          list.appendChild(item);
        }

        header.addEventListener('click', () => {
          header.classList.toggle('collapsed');
          list.classList.toggle('collapsed');
        });

        group.appendChild(header);
        group.appendChild(list);
        groupsEl.appendChild(group);
      }

      updateLayers();
    }

    function clearEgo() {
      currentEgo = null;
      document.getElementById('ego-result').classList.remove('visible');
      document.getElementById('ego-error').style.display = 'none';
      document.getElementById('city-ego').value = '';
      updateLayers();
    }

    // ── Init ──
    async function init() {
      try {
        const resp = await fetch('twin_cities_data.json');
        if (!resp.ok) throw new Error(`Failed to load data: ${resp.status}`);
        allData = await resp.json();
      } catch (e) {
        document.getElementById('loading').innerHTML =
          `<div style="color:#f87171; text-align:center; max-width:400px;">
            <p style="font-size:16px; margin-bottom:8px;">Could not load twin_cities_data.json</p>
            <p style="font-size:13px; color:#888;">Run <code style="background:rgba(255,255,255,0.1); padding:2px 6px; border-radius:4px;">python fetch_data.py</code> first to generate the data file.</p>
          </div>`;
        return;
      }

      // Stats
      document.getElementById('stat-cities').textContent = allData.stats.totalCities.toLocaleString();
      document.getElementById('stat-connections').textContent = allData.stats.totalConnections.toLocaleString();
      document.getElementById('stat-families').textContent = allData.stats.communities.toLocaleString();
      const continents = new Set(allData.nodes.map(n => n.continent));
      document.getElementById('stat-countries').textContent = continents.size;

      // Build adjacency map and city lookup from edges
      adjacency = new Map();
      cityByName = new Map();
      for (const node of allData.nodes) {
        cityByName.set(node.name, node);
      }
      for (const edge of (allData.edges || [])) {
        if (!adjacency.has(edge.source)) adjacency.set(edge.source, new Set());
        if (!adjacency.has(edge.target)) adjacency.set(edge.target, new Set());
        adjacency.get(edge.source).add(edge.target);
        adjacency.get(edge.target).add(edge.source);
      }
      cityNames = [...cityByName.keys()].sort();

      // Init Deck.gl
      deckInstance = new deck.DeckGL({
        container: 'map',
        mapStyle: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
        initialViewState: { longitude: 10, latitude: 30, zoom: 2.2, pitch: 35, bearing: 0 },
        controller: true,
        layers: [],
      });

      updateLayers();
      document.getElementById('loading').style.display = 'none';

      // Wire map controls
      const showArcsCheckbox = document.getElementById('show-arcs');
      const arcControls = document.getElementById('arc-controls');
      showArcsCheckbox.addEventListener('change', () => {
        showArcs = showArcsCheckbox.checked;
        arcControls.style.display = showArcs ? 'block' : 'none';
        updateLayers();
      });
      document.getElementById('color-mode').addEventListener('change', updateLayers);
      document.getElementById('opacity').addEventListener('input', updateLayers);
      document.getElementById('width').addEventListener('input', updateLayers);
      document.getElementById('min-degree').addEventListener('input', (e) => {
        document.getElementById('min-degree-val').textContent = e.target.value;
        updateLayers();
      });

      // Wire autocomplete
      setupAutocomplete('city-from', 'ac-from-list');
      setupAutocomplete('city-to', 'ac-to-list');

      // Wire pathfinder buttons
      document.getElementById('btn-find-path').addEventListener('click', () => {
        const from = document.getElementById('city-from').value.trim();
        const to = document.getElementById('city-to').value.trim();

        if (!from || !to) { showError('Enter both city names.'); return; }
        if (!cityByName.has(from)) { showError(`City not found: "${from}"`); return; }
        if (!cityByName.has(to)) { showError(`City not found: "${to}"`); return; }

        const path = bfs(from, to);
        if (path) {
          showPath(path);
        } else {
          showError(`No path between "${from}" and "${to}" \u2014 they are in different sibling families.`);
        }
      });

      document.getElementById('btn-clear-path').addEventListener('click', clearPath);

      // Wire explorer
      setupAutocomplete('city-ego', 'ac-ego-list');

      document.getElementById('btn-explore').addEventListener('click', () => {
        const city = document.getElementById('city-ego').value.trim();
        if (!city) {
          document.getElementById('ego-error').textContent = 'Enter a city name.';
          document.getElementById('ego-error').style.display = 'block';
          return;
        }
        if (!cityByName.has(city)) {
          document.getElementById('ego-error').textContent = `City not found: "${city}"`;
          document.getElementById('ego-error').style.display = 'block';
          return;
        }
        showEgo(city);
      });

      document.getElementById('btn-clear-ego').addEventListener('click', clearEgo);
    }

    init();
  </script>
</body>
</html>
